version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: firearena-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: firearena
    ports:
      - '5432:5432'
    volumes:
      - firearena_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: firearena-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - firearena_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  firearena_pgdata:
  firearena_redis:
